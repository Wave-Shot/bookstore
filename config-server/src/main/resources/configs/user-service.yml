server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/user_db
    username: admin
    password: secret
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: bookstore-super-secret-key-must-be-long-enough-256bits
  expiry: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs