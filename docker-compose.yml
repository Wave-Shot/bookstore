version: "3.9"

services:

  # ── Databases ──────────────────────────────────────────────

  user-db:
    image: postgres:16
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"

  admin-db:
    image: postgres:16
    environment:
      POSTGRES_DB: admin_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5434:5432"

  product-db:
    image: postgres:16
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5435:5432"

  wishlist-db:
    image: postgres:16
    environment:
      POSTGRES_DB: wishlist_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5436:5432"

  customer-db:
    image: postgres:16
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5437:5432"

  order-db:
    image: postgres:16
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5438:5432"

  feedback-db:
    image: postgres:16
    environment:
      POSTGRES_DB: feedback_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5439:5432"

  # ── Redis (Cart Service) ───────────────────────────────────

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── Kafka + Zookeeper ─────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1